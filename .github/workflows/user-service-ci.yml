name: User Service CI

on:
  push:
    branches: [ "dev", "main" ]
    paths:
      - "services/user-service/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "services/user-service/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build project
        run: ./mvnw clean install

      - name: Run tests
        run: ./mvnw test